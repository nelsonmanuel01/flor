<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <title>Meu Cartão Digital</title>

    <link rel="icon" href="https://link-da-tua-foto.png" type="image/x-icon">

    <style>
        :root {
            --primary-color: #25d366;
            /* Verde WhatsApp */
            --bg-color: #f4f4f9;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            padding: 20px;
            color: var(--text-color);
        }

        .card {
            background: white;
            width: 100%;
            max-width: 350px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
            padding: 30px 20px;
            overflow: hidden;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #ddd;
            margin-bottom: 15px;
            object-fit: cover;
        }

        h2 {
            margin: 10px 0 5px;
        }

        p {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 25px;
        }

        /* Estilo dos Botões */
        .btn {
            display: block;
            background: white;
            color: var(--text-color);
            text-decoration: none;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #f0f0f0;
            transform: translateY(-2px);
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
            border: none;
        }

        /* Área do IBAN (Usando :target) */
        /* Configuração inicial da "barriga" (escondida e encolhida) */
        #iban-box {
            max-height: 0;
            /* Altura zero para começar */
            opacity: 0;
            /* Totalmente transparente */
            overflow: hidden;
            /* Esconde o que estiver fora da altura zero */
            background: #f9f9f9;
            margin-top: 0;
            border-radius: 10px;
            transition: all 0.5s ease-in-out;
            /* A magia acontece aqui: 0.5 segundos de animação */
        }

        /* Quando o link #iban-box é clicado (Estado Ativo) */
        #iban-box:target {
            max-height: 200px;
            /* Define uma altura suficiente para o conteúdo */
            opacity: 1;
            /* Torna-se visível */
            margin-top: 15px;
            padding: 15px;
            border: 1px dashed #ccc;
        }

        #iban-box:target {
            display: block;
            /* Mostra quando o link #iban-box for clicado */
        }

        .iban-text {
            font-family: monospace;
            font-size: 1.1em;
            word-break: break-all;
        }
    </style>
    </head>

    <body>

        <div class="card">
            <img src="imag/pag (1).png" class="profile-img">

            <h2> Marliflor</h2>
            <p>Buqês & Decorações</p>

            <a href="https://wa.me/943460063" class="btn btn-primary">Falar no WhatsApp</a>
            <a href="logo.html" class="btn">Ver Catálogo 📂</a>
            <a href="https://instagram.com/teuuser" class="btn">Instagram 📸</a>
            <a href="https://linkedin.com/in/teuuser" class="btn">LinkedIn 💼</a>

            <a href="#iban-box" class="btn">Dados para Pagamento (IBAN) 💳</a>

            <div id="iban-box">
                <h4>Dados Bancários</h4>
                <p class="iban-text">AO06 0051 0000 5096 1538 1016 5 <br> Marlina Mateus</p>
                <small>Clica e segura para copiar</small>
                <br><br>
                <a href="#" style="color: #999; text-decoration: none; font-size: 0.8em;">Fechar [x]</a>
            </div>
        </div>
    </body>

</html>
