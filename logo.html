<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Catálogo Digital</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --dark-color: #1e293b;
            --light-bg: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--light-bg);
            margin: 0;
           
        }

        header {
            text-align: center;
            
        }

        h1 { color: var(--dark-color); }

        /* Grid do Catálogo */
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            
            margin: 0 auto;
        }

        /* Cartão do Produto */
        .product-card {
            background: white;
            border-radius: 5px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-image {
            margin-left: 15%;
            width: 70%;
            height: 500px;
            background-color: #ddd;
            
        }

        .product-info {
            padding: 15px;
        }

        .product-title {
            font-size: 1.2rem;
            margin: 0;
            color: var(--dark-color);
        }


        .buy-button {
            display: block;
            text-align: center;
            background: var(--primary-color);
            color: white;
            text-decoration: none;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
        }
         .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #ddd;
            margin-bottom: 15px;
            object-fit: cover;
        } 
        h2{
            margin: 10%;
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

<header>
    <h1>  <img src="imag/outro (2).jpg" class="profile-img"></h1>
    <p>Confira nossas ofertas exclusivas</p>
</header>

<div class="catalog-grid">
    <div class="product-card">
        <img src="imag/pag (10).jpeg" alt="Produto 1" class="product-image">
        <img src="imag/pag (11).jpeg" alt="Produto 1" class="product-image">
        <img src="imag/pag (9).jpeg" alt="Produto 1" class="product-image">
        <div class="product-info">
            <h2 class="product-title"> Disponiveis para todo tipo de evento</h2>
            
            <a href="https://wa.me/943460063" class="buy-button">Pedir no WhatsApp</a>
        </div>
    </div>

    <div class="product-card">
        <img src="imag/pag (3).JPG" alt="Produto 2" class="product-image">
        <img src="imag/pag (14).jpeg" alt="Produto 2" class="product-image">
        <img src="imag/pag (1).JPG" alt="Produto 2" class="product-image">
        <div class="product-info">
            <a href="https://wa.me/943460063" class="buy-button">Pedir no WhatsApp</a>
        </div>
    </div>
</div>

</body>
</html>
